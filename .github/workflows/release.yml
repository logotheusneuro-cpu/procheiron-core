name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — no long-lived token stored
# anywhere. Requires this repo/workflow to be registered as a trusted publisher
# on https://pypi.org/manage/project/procheiron/settings/publishing/
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
