<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 312" role="img" aria-label="Procheiron lifecycle: draft to candidate to validated, through an enforced independent-review gate, to active; every transition lands in a hash-chained audit log whose head can be anchored externally" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">

  <!-- ===== lifecycle row ===== -->
  <text x="20" y="30" font-size="12" letter-spacing="2" fill="#9198a1">LIFECYCLE</text>

  <g font-size="15" text-anchor="middle">
    <rect x="20" y="48" width="88" height="38" rx="19" fill="#21262d" stroke="#6e7681"/>
    <text x="64" y="72" fill="#e6edf3">draft</text>

    <rect x="146" y="48" width="118" height="38" rx="19" fill="#21262d" stroke="#6e7681"/>
    <text x="205" y="72" fill="#e6edf3">candidate</text>

    <rect x="302" y="48" width="118" height="38" rx="19" fill="#21262d" stroke="#6e7681"/>
    <text x="361" y="72" fill="#e6edf3">validated</text>

    <rect x="560" y="48" width="98" height="38" rx="19" fill="#238636"/>
    <text x="609" y="72" fill="#ffffff">active ✓</text>

    <rect x="696" y="48" width="132" height="38" rx="19" fill="none" stroke="#6e7681" stroke-dasharray="5 5"/>
    <text x="762" y="72" fill="#9198a1">superseded</text>
  </g>

  <!-- arrows between pills -->
  <g stroke="#6e7681" stroke-width="2" fill="#6e7681">
    <line x1="108" y1="67" x2="136" y2="67"/><path d="M 136 62 L 146 67 L 136 72 Z"/>
    <line x1="264" y1="67" x2="292" y2="67"/><path d="M 292 62 L 302 67 L 292 72 Z"/>
    <line x1="420" y1="67" x2="462" y2="67"/><path d="M 462 62 L 472 67 L 462 72 Z"/>
    <line x1="504" y1="67" x2="550" y2="67"/><path d="M 550 62 L 560 67 L 550 72 Z"/>
    <line x1="658" y1="67" x2="686" y2="67" stroke-dasharray="5 5"/><path d="M 686 62 L 696 67 L 686 72 Z"/>
  </g>

  <!-- the review gate -->
  <g stroke="#3fb950" stroke-width="4" stroke-linecap="round">
    <line x1="478" y1="40" x2="478" y2="94"/>
    <line x1="492" y1="40" x2="492" y2="94"/>
  </g>
  <text x="485" y="116" font-size="13" text-anchor="middle" fill="#3fb950" font-weight="600">independent review</text>
  <text x="485" y="133" font-size="12" text-anchor="middle" fill="#9198a1">reviewer ≠ author — enforced, not asked</text>

  <!-- ===== audit log row ===== -->
  <text x="20" y="196" font-size="12" letter-spacing="2" fill="#9198a1">TAMPER-EVIDENT AUDIT LOG</text>

  <!-- dotted drops from transitions into the log -->
  <g stroke="#6e7681" stroke-width="1.5" stroke-dasharray="2 4" fill="none">
    <line x1="141" y1="86" x2="80" y2="214"/>
    <line x1="297" y1="86" x2="250" y2="214"/>
    <line x1="497" y1="150" x2="430" y2="214"/>
  </g>
  <text x="330" y="166" font-size="12" fill="#9198a1">every transition is recorded…</text>

  <g font-size="13" text-anchor="middle">
    <rect x="20" y="214" width="120" height="48" rx="8" fill="#21262d" stroke="#6e7681"/>
    <text x="80" y="234" fill="#e6edf3">event 0</text>
    <text x="80" y="252" fill="#9198a1" font-size="11">entry_hash a41f…</text>

    <rect x="190" y="214" width="120" height="48" rx="8" fill="#21262d" stroke="#6e7681"/>
    <text x="250" y="234" fill="#e6edf3">event 1</text>
    <text x="250" y="252" fill="#9198a1" font-size="11">entry_hash 98c4…</text>

    <rect x="360" y="214" width="120" height="48" rx="8" fill="#21262d" stroke="#6e7681"/>
    <text x="420" y="234" fill="#e6edf3">event 2</text>
    <text x="420" y="252" fill="#9198a1" font-size="11">entry_hash 5d20…</text>

    <rect x="530" y="214" width="120" height="48" rx="8" fill="#21262d" stroke="#6e7681"/>
    <text x="590" y="234" fill="#e6edf3">event 3</text>
    <text x="590" y="252" fill="#9198a1" font-size="11">entry_hash e07b…</text>
  </g>

  <!-- chain links, labeled once -->
  <g stroke="#6e7681" stroke-width="2" fill="#6e7681">
    <line x1="140" y1="238" x2="180" y2="238"/><path d="M 180 233 L 190 238 L 180 243 Z"/>
    <line x1="310" y1="238" x2="350" y2="238"/><path d="M 350 233 L 360 238 L 350 243 Z"/>
    <line x1="480" y1="238" x2="520" y2="238"/><path d="M 520 233 L 530 238 L 520 243 Z"/>
  </g>
  <text x="160" y="228" font-size="11" text-anchor="middle" fill="#9198a1">prev_hash</text>

  <!-- external anchor pin on the head -->
  <g stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round">
    <line x1="678" y1="238" x2="706" y2="238"/>
    <circle cx="716" cy="238" r="8"/>
    <line x1="716" y1="246" x2="716" y2="258"/>
  </g>
  <text x="736" y="234" font-size="13" fill="#3fb950" font-weight="600">head anchored</text>
  <text x="736" y="251" font-size="12" fill="#9198a1">in git, checked by</text>
  <text x="736" y="267" font-size="12" fill="#9198a1">--expect-head</text>
</svg>
